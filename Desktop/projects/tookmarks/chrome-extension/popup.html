<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 320px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  padding: 20px;
}
h1 {
  font-size: 18px;
  font-weight: 800;
  background: linear-gradient(135deg, #58a6ff, #bc8cff, #f778ba);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.subtitle {
  color: #8b949e;
  font-size: 12px;
  margin-bottom: 16px;
}
#start-btn {
  width: 100%;
  padding: 10px;
  background: #238636;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
#start-btn:hover { background: #2ea043; }
#start-btn:disabled {
  background: #21262d;
  color: #8b949e;
  cursor: not-allowed;
}
#stop-btn {
  width: 100%;
  padding: 10px;
  background: #da3633;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  display: none;
  transition: background 0.2s;
}
#stop-btn:hover { background: #f85149; }
#status {
  margin-top: 12px;
  padding: 10px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  font-size: 13px;
  display: none;
}
.count {
  font-size: 24px;
  font-weight: 800;
  color: #58a6ff;
}
.label {
  color: #8b949e;
  font-size: 11px;
  margin-top: 2px;
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: #21262d;
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #58a6ff, #bc8cff);
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s;
}
#error {
  color: #f85149;
  font-size: 12px;
  margin-top: 8px;
  display: none;
}
.instructions {
  margin-top: 12px;
  padding: 10px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  font-size: 11px;
  color: #8b949e;
  line-height: 1.5;
}
.instructions a {
  color: #58a6ff;
  text-decoration: none;
}
</style>
</head>
<body>
  <h1>Tookmarks</h1>
  <p class="subtitle">Export your Twitter/X bookmarks to JSON</p>

  <button id="start-btn">Export Bookmarks</button>
  <button id="stop-btn">Stop & Download</button>

  <div id="status">
    <div class="count" id="count">0</div>
    <div class="label">bookmarks collected</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
  </div>

  <div id="error"></div>

  <div class="instructions">
    Navigate to <a href="https://x.com/i/bookmarks" target="_blank">x.com/i/bookmarks</a> first, then click Export.
  </div>

  <script src="popup.js"></script>
</body>
</html>
